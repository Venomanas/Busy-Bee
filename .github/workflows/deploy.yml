name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iman
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: iman/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Vercel deploy would typically go here using VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
      # Firebase deploy (rules/functions) would typically go here using FIREBASE_SERVICE_ACCOUNT JSON

